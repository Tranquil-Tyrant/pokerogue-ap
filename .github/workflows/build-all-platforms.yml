name: Build PokeRogue Archipelago Versions
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows you to trigger the build manually with a single button click

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm Package Manager
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Compile Game Code & Standalone Apps
        run: |
          pnpm install --ignore-scripts
          npx pnpm run app:build

      - name: Upload Windows & Linux Game Binaries
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-Builds
          path: dist/win-unpacked/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm Package Manager
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set Up Java JDK Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set Up Android SDK System
        uses: android-actions/setup-android@v3

      - name: Package Web Files & Compile Android APK
        run: |
          pnpm install --ignore-scripts
          npm run build
          npx cap init "PokeRogue Archipelago" "com.pokerogue.archipelago" --web-dir=dist
          npx cap add android
          npx cap sync
          cd android && ./gradlew assembleDebug

      - name: Upload Finished Mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

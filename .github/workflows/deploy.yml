name: Deploy Web Fork to GitHub Pages

on:
  push:
    branches:
      - master # Triggers every time you push or change code on your main branch
  workflow_dispatch: # Gives you a single manual click button on GitHub to rebuild whenever you want

permissions:
  contents: write # Allows the cloud runner to write to your gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm Package Manager
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Dependencies and Compile Production Assets
        run: |
          pnpm install --ignore-scripts
          npx pnpm run build

      - name: Deploy Production dist Folder to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Automatically targets and pushes your built files to gh-pages!
          branch: gh-pages
